workflows:
  android-workflow:
    name: PieBrowser Android
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode none
    artifacts:
      - app/build/outputs/apk/debug/*.apk
